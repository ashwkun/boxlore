name: 🌀 Restore Turso DB from Qdrant and Charts

on:
  workflow_dispatch:

concurrency:
  group: sync-pi-data # Avoid running concurrently with daily/scheduled sync tasks

jobs:
  restore:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install

      - name: Run Database Restoration
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
          PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}
        run: |
          chmod +x scripts/restore-db-from-qdrant.js
          node scripts/restore-db-from-qdrant.js
