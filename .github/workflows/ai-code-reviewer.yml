name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Git Diff
        id: git_diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          else
            git diff HEAD~1 HEAD > diff.txt
          fi
          echo "DIFF_SIZE=$(wc -c < diff.txt)" >> $GITHUB_ENV

      - name: Run Review
        if: env.DIFF_SIZE != '0'
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff.txt', 'utf8');
            
            // Truncate diff if it is too huge (to avoid token limits)
            if (diff.length > 50000) {
              console.log('Diff is too large, truncating to 50k characters.');
            }
            const truncatedDiff = diff.slice(0, 50000);
            
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              core.setFailed('GEMINI_API_KEY secret is not set.');
              return;
            }
            
            const prompt = `You are an expert AI code reviewer. Please review the following git diff and provide concise, constructive feedback, pointing out any bugs, security issues, performance problems, or anti-patterns. Structure your response with a summary and a bulleted list of specific findings. Keep the tone helpful, professional, and clear.
            
            Here is the git diff:
            \`\`\`diff
            ${truncatedDiff}
            \`\`\`
            `;
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
              })
            });
            
            if (!response.ok) {
              const errText = await response.text();
              core.setFailed(`Gemini API error: ${errText}`);
              return;
            }
            
            const data = await response.json();
            const reviewText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!reviewText) {
              core.setFailed('Failed to retrieve review content from Gemini API response.');
              return;
            }
            
            const commentBody = `### 🤖 AI Code Review (Gemini 1.5 Flash)\n\n${reviewText}`;
            
            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            } else {
              // Post comment to commit
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: commentBody
              });
            }
