name: Instrumented Tests

# Runs when a PR enters the merge queue (merge click), or via manual dispatch.
# Not on every PR push — emulator jobs are expensive for intermediate commits.
on:
  merge_group:
  workflow_dispatch:

jobs:
  compose-android-test:
    name: feature:home connectedDebugAndroidTest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install Android build-tools 36
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "build-tools;36.0.0" "platforms;android-36"

      # Same stub as unit-tests.yml — plugin config only; not a Firebase mock.
      - name: Write CI stub google-services.json
        uses: ./.github/actions/write-ci-google-services

      - name: Run Compose androidTest on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          script: ./gradlew :feature:home:connectedDebugAndroidTest --continue

      - name: Scrub google-services.json
        if: always()
        run: rm -f app/google-services.json
