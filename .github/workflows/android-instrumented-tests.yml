name: Instrumented Tests

# Same merge-gate as unit tests: only when `merge-ci` is on the PR (or merge
# queue / manual). Emulator jobs are too expensive for every intermediate push.
# Direct bot/owner pushes to master do not use PRs and are unaffected.
on:
  pull_request:
    types: [labeled, synchronize, opened, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

jobs:
  compose-android-test:
    name: ${{ matrix.module }} connectedDebugAndroidTest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'merge-ci'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        module:
          - feature:home
          - feature:info
          - feature:player
          - feature:explore
          - feature:library
          - feature:onboarding
          - feature:briefing
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build-tools 36
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "build-tools;36.0.0" "platforms;android-36"

      # Same stub as unit-tests.yml — plugin config only; not a Firebase mock.
      - name: Write CI stub google-services.json
        uses: ./.github/actions/write-ci-google-services

      - name: Run Compose androidTest on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          script: ./gradlew :${{ matrix.module }}:connectedDebugAndroidTest --continue

      - name: Scrub google-services.json
        if: always()
        run: rm -f app/google-services.json
