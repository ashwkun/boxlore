name: Gitleaks Scan

# Uses the Gitleaks CLI directly (not gitleaks-action) so organization
# repositories do not require a paid GITLEAKS_LICENSE secret.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          set -euo pipefail
          curl -sSLfo /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks Scan
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect \
              --source . \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --verbose \
              --redact
          else
            # Push: only scan commits in this push (not full history).
            # All-zero "before" means a new/orphan branch tip — scan the tip tree only.
            BEFORE="${{ github.event.before }}"
            ZERO="0000000000000000000000000000000000000000"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO" ]; then
              gitleaks detect --source . --no-git --verbose --redact
            else
              gitleaks detect \
                --source . \
                --log-opts="${BEFORE}..${{ github.sha }}" \
                --verbose \
                --redact
            fi
          fi
