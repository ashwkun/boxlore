name: Custom AI Reviewer

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  review:
    name: Code Quality & Security Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so we can diff against master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Review Script
        env:
          GROQ_API_KEY: ${{ secrets.REVIEW_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/ai-review.js
