appId: cx.aswin.boxlore
---
- launchApp
- tapOn:
    text: ".*(Accept|Allow|Continue|Skip|Not now).*"
    optional: true
# Cold-start visibility smoke. Primary gate matches smoke_launch (strict).
- extendedWaitUntil:
    visible:
      id: "home_settings_button"
    timeout: 20000
- assertVisible:
    id: "home_settings_button"
# Bottom navigation labels are always present on the home shell (strict).
- assertVisible:
    text: "Home"
- assertVisible:
    text: "Library"
