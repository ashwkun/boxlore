appId: cx.aswin.boxlore
---
- launchApp
- tapOn:
    text: ".*(Accept|Allow|Continue|Skip|Not now).*"
    optional: true
# Cold-start visibility smoke. Primary gate matches smoke_launch (strict).
- extendedWaitUntil:
    visible:
      id: "home_settings_button"
    timeout: 20000
- assertVisible:
    id: "home_settings_button"
# Secondary nav affordances stay soft — first-run chrome may still settle.
- assertVisible:
    text: ".*(Home|Library|Explore|Settings).*"
    optional: true
