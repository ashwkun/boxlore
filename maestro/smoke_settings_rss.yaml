appId: cx.aswin.boxlore
---
- launchApp
# Only optional line: first-run consent / permission chrome varies by device state.
- tapOn:
    text: ".*(Accept|Allow|Continue|Skip|Not now).*"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home_settings_button"
    timeout: 20000
# Open Settings from the home top bar (stable testTag).
- tapOn:
    id: "home_settings_button"
- assertVisible: "Settings"
# Enter the Library settings category (tap its description to avoid the bottom-nav "Library").
- tapOn: "Region, RSS feeds, import and export"
- assertVisible: "Add podcast by RSS feed"
# Open the Add RSS dialog and assert its tagged URL field, then cancel.
- tapOn: "Add podcast by RSS feed"
- extendedWaitUntil:
    visible:
      id: "settings_add_rss_url"
    timeout: 10000
- assertVisible:
    id: "settings_add_rss_url"
- assertVisible: "Add RSS feed"
- tapOn:
    id: "settings_add_rss_cancel"
