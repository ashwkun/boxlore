appId: cx.aswin.boxlore
---
- launchApp
# First-run / consent surfaces may appear; skip when present.
- tapOn:
    text: ".*(Accept|Allow|Continue|Skip|Not now).*"
    optional: true
- extendedWaitUntil:
    visible:
      id: "home_settings_button"
    timeout: 15000
    optional: true
# Prefer testTag; fall back to content description text.
- assertVisible:
    id: "home_settings_button"
    optional: true
- assertVisible:
    text: "Settings"
    optional: true
